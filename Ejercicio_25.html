<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Ejercicio 25</title>
    </head>
    <body>
        <h1>Ejercicio 25</h1>
        <hr>
        <p>Diseñe un formulario que solicite nombre, correo electrónico y ciudad del usuario. Los datos deben enviarse a otro archivo PHP donde se muestre toda la información ingresada.</p>
        <hr>

        <h2>Formulario de verificacion</h2>
        <form action="Ejercicio_25.php" method="POST">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" required>
            <br>
            <label for="correo">Correo electrónico:</label>
            <input type="email" id="correo" name="correo" required>
            <br>
            <label for="ciudad">Ciudad:</label>
            <input type="text" id="ciudad" name="ciudad" required>
            <button type="submit">Enviar</button>
        </form>
    </body>
</html>

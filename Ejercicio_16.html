        <h1>Ejercicio 16</h1>
        <hr>
        <p>Diseñe un formulario que solicite el nombre del empleado, las horas trabajadas y el pago por hora. Los datos deben enviarse a otro archivo PHP donde se calcule y muestre el salario total.</p>
        <hr>
    
       <h2>Formulario de verificación</h2>
    <form action="Ejercicio_16.php" method="POST">
        <label for="nombre">Ingrese el nombre del empleado:</label>
        <input type="text" id="nombre" name="nombre" required>
        <label for="horas">Ingrese las horas trabajadas:</label>
        <input type="number" id="horas" name="horas" required>
        <label for="pago">Ingrese el pago por hora:</label>
        <input type="number" id="pago" name="pago" required>
        <button type="submit">Enviar</button>
    </form>
    </body>
